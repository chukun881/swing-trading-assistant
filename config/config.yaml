# 技术指标参数
indicators:
  ema_short: 20
  ema_long: 50
  rsi_period: 14
  bollinger_period: 20
  bollinger_std: 2

# Pullback策略参数
pullback:
  rsi_oversold: 30
  rsi_recovery_threshold: 0.5  # RSI回升阈值

# Breakout策略参数
breakout:
  rsi_min: 60
  rsi_max: 75
  check_band_squeeze: true
  band_squeeze_threshold: 0.7

# Exit策略参数
exit:
  stop_loss_pct: 0.05  # 5%止损
  take_profit_rsi: 75
  trailing_stop_enabled: false

# 市场配置
markets:
  us:
    exchanges: ["NASDAQ", "NYSE", "AMEX"]
    min_volume: 1000000
  malaysia:
    exchanges: ["BURSA"]
    min_volume: 500000

# 其他配置
log_level: INFO

# 股票扫描配置
max_stocks_per_market: 300  # 每个市场扫描的最大股票数量
